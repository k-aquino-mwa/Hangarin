{% extends "base.html" %}

{% block title %}Delete Priority | HANGARIN{% endblock %}

{% block content %}
<div class="content">
    <div class="page-inner">
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="mb-1" style="color: var(--coquette-text)">Delete Priority</h2>
                <p class="text-muted">Confirm before removing this priority.</p>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card coquette">
                    <div class="card-body">
                        <p class="mb-4">Are you sure you want to delete <strong>"{{ object.name }}"</strong>?</p>

                        <form method="post">
                            {% csrf_token %}
                            <div class="d-flex justify-content-between">
                                <a href="{% url 'priority-list' %}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-danger">Delete</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
