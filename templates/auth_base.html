{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HANGARIN{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/ready.css' %}">
    <link rel="stylesheet" href="{% static 'css/demo.css' %}">

    <style>
        :root {
            --coquette-bg: #fbf4ff;
            --coquette-surface: rgba(255, 255, 255, 0.92);
            --coquette-border: rgba(206, 166, 226, 0.6);
            --coquette-text: #432e54;
            --coquette-muted: rgba(67, 46, 84, 0.65);
        }

        body {
            background: linear-gradient(162deg, rgba(255,229,234,0.9) 0%, rgba(255,214,214,0.9) 55%, rgba(255,238,244,0.9) 100%),
                        url("{% static 'img/cat.png' %}") center/cover no-repeat fixed;
            min-height: 100vh;
            margin: 0;
            color: var(--coquette-text);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
