{% extends "base.html" %}

{% block title %}Delete Category | HANGARIN{% endblock %}

{% block content %}
<div class="content">
    <div class="page-inner">
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="mb-1" style="color: var(--coquette-text)">Delete Category</h2>
                <p class="text-muted">This action cannot be undone.</p>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <div class="card coquette">
                    <div class="card-body">
                        <p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>

                        <form method="post">
                            {% csrf_token %}
                            <div class="d-flex justify-content-between">
                                <a href="{% url 'category-list' %}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-danger">Delete</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
